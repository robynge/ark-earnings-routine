name: daily-holdings

on:
  schedule:
    # 11:00 UTC = 07:00 EDT (7 AM ET, before market open)
    # Note: in winter (EST), this becomes 06:00 ET. Acceptable.
    - cron: '0 11 * * *'
  workflow_dispatch: {}  # allow manual trigger from Actions tab

permissions:
  contents: write  # commit data/LATEST/ back to repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch ARK holdings + parse universe
        run: |
          mkdir -p data/LATEST/holdings
          python scripts/fetch_holdings.py data/LATEST/holdings/
          python scripts/parse_holdings.py data/LATEST/holdings/*.csv > data/LATEST/universe.json
          # Write metadata using Python (avoids shell quoting issues)
          python - <<'PY'
          import json, os, glob
          from datetime import datetime, timezone
          uni = json.load(open("data/LATEST/universe.json"))
          meta = {
              "fetched_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "date_label": os.popen("TZ=America/New_York date +%Y-%m-%d").read().strip(),
              "csv_count": len(glob.glob("data/LATEST/holdings/*.csv")),
              "ticker_count": len(uni),
          }
          with open("data/LATEST/_fetched_at.json", "w") as f:
              json.dump(meta, f, indent=2)
          print(json.dumps(meta, indent=2))
          PY

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/LATEST/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily holdings refresh $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi
